name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Bats tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run tests
        run: ./run_tests.sh

  lint:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck
        run: |
          shellcheck -x \
            install.sh task-init run_tests.sh \
            bin/* lib/*.sh tools/*.sh \
            tests/helpers/*.bash \
            */install.sh */bin/*

  drift-check:
    name: Loadout drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check loadout drift
        run: bash tools/check-drift.sh
